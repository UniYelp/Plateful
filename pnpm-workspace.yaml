  '@hono/zod-validator': ^0.7.3
  convex: ^1.37.0
  effect: ^3.19.14
  hono: ^4.9.9
  zod: ^4.3.5
  "ai": "6.0.190"
  "@ai-sdk/google": "3.0.79"
  "@opentelemetry/api": "^1.9.0"

catalogMode: manual

cleanupUnusedCatalogs: true
